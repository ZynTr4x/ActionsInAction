name: Test multiple jobs in parallel and sequentially

#on push and pull request
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  # For manually use it
  workflow_dispatch:

jobs:
  job-1:
    runs-on: ubuntu-latest
    steps:
      - run: "echo Job: ${{github.job}}"
  job-2:
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - run: "echo Job: ${{github.action}}"
  job-3:
    runs-on: ubuntu-latest
    needs: job-1
    steps:
      - run: "echo Job: ${{github.actor}}"
  job-4:
    runs-on: ubuntu-latest
    needs: [job-2, job-3]
    steps:
      - run: "echo Job: ${{github.repository}}"
  
