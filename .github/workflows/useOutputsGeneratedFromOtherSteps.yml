name: TestPassingOutputs

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Pass Output
        id: test-runner
        run: echo "TEST_PERCENTAGE=100" >> "$GITHUB_OUTPUT"

      - name: Use Output from Test Runner
        run: |
          echo "Using output from previous step",
          echo "Output: ${{steps.test-runner.outputs.TEST_PERCENTAGE}}"
