name: CI using other actions

on:
  push:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@main

      - name: Run a one-line script
        run: echo Hello, world!

      - name: Run other action
        uses: ./github/workflows/blank.yml
